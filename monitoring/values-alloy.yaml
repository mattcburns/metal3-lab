alloy:
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  configMap:
    content: |
      // --- EXISTING LOKI LOG PIPELINE ---
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "k8s_labels" {
        targets = discovery.kubernetes.pods.targets

        // Notice: No semicolons, proper newlines required!
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "service_name"
        }
      }

      discovery.relabel "filter_ports" {
        targets = discovery.relabel.k8s_labels.output
        rule {
          source_labels = ["__meta_kubernetes_pod_container_port_number"]
          regex         = "8080|8443|9090|9100|9580|9608"
          action        = "drop"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.filter_ports.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // --- NEW: BEYLA OTELEMETRY TRACE PIPELINE ---

      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output {
          traces = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.batch "default" {
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }
