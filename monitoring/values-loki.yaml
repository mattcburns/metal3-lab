deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: 'filesystem'
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # Enable the compactor to delete old logs
  compactor:
    retention_enabled: true
    delete_request_store: filesystem  # <-- NEW: Tell Loki where to track deletions

  # Set the global retention period to 14 days
  limits_config:
    retention_period: 14d

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

lokiCanary:
  enabled: false

test:
  enabled: false
